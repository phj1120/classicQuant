name: ClassicQuant

on:
  schedule:
    # 15:30 UTC daily (Mon-Fri)
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: classicquant-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SOURCE_BRANCH: ${{ github.ref_name }}
      DATA_BRANCH: trading
      IS_MAIN: ${{ github.ref_name == 'main' }}

    steps:
      # main: trading 브랜치 체크아웃 후 main 위에 rebase
      - name: Checkout data branch (main only)
        if: github.ref_name == 'main'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DATA_BRANCH }}
          fetch-depth: 0
        continue-on-error: true
        id: checkout-data

      - name: Init data branch from main
        if: github.ref_name == 'main' && steps.checkout-data.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create data branch
        if: github.ref_name == 'main' && steps.checkout-data.outcome == 'failure'
        run: |
          git checkout -b "$DATA_BRANCH"
          git push origin "$DATA_BRANCH"

      - name: Rebase data branch onto main
        if: github.ref_name == 'main' && steps.checkout-data.outcome == 'success'
        run: |
          git fetch origin main
          git rebase origin/main

      # non-main: 소스 브랜치만 체크아웃 (trading 불필요)
      - name: Checkout source branch (non-main)
        if: github.ref_name != 'main'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Write key.json
        env:
          KIS_KEY_JSON: ${{ secrets.KIS_KEY_JSON }}
        run: |
          if [ -z "$KIS_KEY_JSON" ]; then
            echo "Missing required secret: KIS_KEY_JSON"
            exit 1
          fi
          echo "$KIS_KEY_JSON" > key.json

      - name: Apply custom config
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        if: env.CONFIG_JSON != ''
        run: echo "$CONFIG_JSON" > config.json

      - name: Run rebalance (main only)
        if: env.IS_MAIN == 'true'
        run: |
          set -euo pipefail
          LOG_DIR="logs"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ).log"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5"
            if python run_rebalance.py | tee "$LOG_FILE"; then
              exit 0
            fi
            sleep 30
          done
          exit 1

      - name: Generate report only (non-main)
        if: env.IS_MAIN != 'true'
        run: python run_rebalance.py --report-only

      - name: Commit & push (main only)
        if: env.IS_MAIN == 'true'
        run: |
          set -euo pipefail
          git add reports data
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: report $(date -u +%Y-%m-%d)"
          git push origin "$DATA_BRANCH" --force-with-lease
